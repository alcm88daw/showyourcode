name: Deploy TestsApp

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  AWS_REGION: eu-south-2
  STAGE: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
  SAM_STACK_NAME: ${{ github.ref_name == 'main' && 'showyourcode-prod' || 'showyourcode-dev' }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalar SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Build SAM
        run: sam build

      - name: Deploy SAM
        run: |
          sam deploy \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides Stage=${{ env.STAGE }}

      - name: Obtener outputs del stack
        id: stack-outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs" \
            --output json)
          echo "api_url=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="ApiUrl") | .OutputValue')" >> $GITHUB_OUTPUT
          echo "user_pool_id=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="UserPoolId") | .OutputValue')" >> $GITHUB_OUTPUT
          echo "user_pool_client_id=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="UserPoolClientId") | .OutputValue')" >> $GITHUB_OUTPUT

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ steps.stack-outputs.outputs.api_url }}
          VITE_USER_POOL_ID: ${{ steps.stack-outputs.outputs.user_pool_id }}
          VITE_USER_POOL_CLIENT_ID: ${{ steps.stack-outputs.outputs.user_pool_client_id }}
        run: npm ci && npm run build

      - name: Deploy frontend a S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
