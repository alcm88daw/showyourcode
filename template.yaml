AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TestsApp - Infraestructura completa

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 15
    MemorySize: 256

# ─── Parámetros ────────────────────────────────────────────────────────────────
Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
Conditions:
  IsProd: !Equals [!Ref Stage, prod]

# ─── Recursos ──────────────────────────────────────────────────────────────────
Resources:

  # Cognito
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub showyourcode-users-${Stage}
      AutoVerifiedAttributes: [email]
      Schema:
        - Name: role
          AttributeDataType: String
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub showyourcode-client-${Stage}
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ─── DynamoDB ────────────────────────────────────────────────────────────────

  UtsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub showyourcode-uts-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ut_id
          AttributeType: S
      KeySchema:
        - AttributeName: ut_id
          KeyType: HASH

  PreguntasTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub showyourcode-preguntas-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ut_id
          AttributeType: S
        - AttributeName: pregunta_id
          AttributeType: S
      KeySchema:
        - AttributeName: ut_id
          KeyType: HASH
        - AttributeName: pregunta_id
          KeyType: RANGE

  ResultadosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub showyourcode-resultados-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: alumno_id
          AttributeType: S
        - AttributeName: ut_id_timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: alumno_id
          KeyType: HASH
        - AttributeName: ut_id_timestamp
          KeyType: RANGE

  UsuariosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub showyourcode-usuarios-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: grupo
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: grupo-index
          KeySchema:
            - AttributeName: grupo
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ─── API Gateway ─────────────────────────────────────────────────────────────
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub showyourcode-api-${Stage}
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: !If
          - IsProd
          - !Sub "'https://${CloudFrontDistribution.DomainName}'"
          - "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuth
        Authorizers:
          CognitoAuth:
            UserPoolArn: !GetAtt UserPool.Arn
        AddDefaultAuthorizerToCorsPreflight: false
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"

  # ─── Lambda: Auth (Cognito trigger) ──────────────────────────────────────────
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-auth/
      Handler: index.handler
      Environment:
        Variables:
          USUARIOS_TABLE: !Ref UsuariosTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsuariosTable
      Events:
        PostConfirmation:
          Type: Cognito
          Properties:
            UserPool: !Ref UserPool
            Trigger: PostConfirmation

  # ─── Lambda: UTs ─────────────────────────────────────────────────────────────
  UtsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-uts/
      Handler: index.handler
      Environment:
        Variables:
          UTS_TABLE: !Ref UtsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UtsTable
      Events:
        GetUts:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /uts
            Method: GET
        CreateUt:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /uts
            Method: POST
        UpdateUt:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /uts/{id}
            Method: PUT
        DeleteUt:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /uts/{id}
            Method: DELETE

  # ─── Lambda: Preguntas ───────────────────────────────────────────────────────
  PreguntasFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-preguntas/
      Handler: index.handler
      Environment:
        Variables:
          PREGUNTAS_TABLE: !Ref PreguntasTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PreguntasTable
      Events:
        GetPreguntas:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /preguntas
            Method: GET
        CreatePregunta:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /preguntas
            Method: POST
        UpdatePregunta:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /preguntas/{id}
            Method: PUT
        DeletePregunta:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /preguntas/{id}
            Method: DELETE

  # ─── Lambda: Resultados ──────────────────────────────────────────────────────
  ResultadosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-resultados/
      Handler: index.handler
      Environment:
        Variables:
          RESULTADOS_TABLE: !Ref ResultadosTable
          USUARIOS_TABLE: !Ref UsuariosTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ResultadosTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsuariosTable
      Events:
        SaveResultado:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /resultados
            Method: POST
        GetResultados:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /resultados
            Method: GET

  # ─── Lambda: Ranking ─────────────────────────────────────────────────────────
  RankingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-ranking/
      Handler: index.handler
      Environment:
        Variables:
          USUARIOS_TABLE: !Ref UsuariosTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsuariosTable
      Events:
        GetRanking:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /ranking
            Method: GET

  # ─── Lambda: Usuarios ────────────────────────────────────────────────────────
  UsuariosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-usuarios/
      Handler: index.handler
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
          USUARIOS_TABLE: !Ref UsuariosTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsuariosTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminDeleteUser
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !GetAtt UserPool.Arn
      Events:
        GetUsuarios:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /usuarios
            Method: GET
        CreateUsuario:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /usuarios
            Method: POST
        UpdateUsuario:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /usuarios/{id}
            Method: PUT
        DeleteUsuario:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /usuarios/{id}
            Method: DELETE

  # ─── Lambda: Accesibilidad ───────────────────────────────────────────────────
  AccesibilidadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-accesibilidad/
      Handler: index.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - polly:SynthesizeSpeech
                - translate:TranslateText
              Resource: '*'
      Events:
        Sintetizar:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /accesibilidad/tts
            Method: POST
        Traducir:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /accesibilidad/traducir
            Method: POST


  # ─── Frontend: S3 + CloudFront ───────────────────────────────────────────────

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub showyourcode-frontend-${Stage}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub showyourcode-oac-${Stage}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt S3Bucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          TargetOriginId: S3Origin
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized (managed)
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${S3Bucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

# ─── Outputs ───────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: URL de la API
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref UserPoolClient
  UtsTableName:
    Description: Tabla UTs
    Value: !Ref UtsTable
  PreguntasTableName:
    Description: Tabla Preguntas
    Value: !Ref PreguntasTable
  ResultadosTableName:
    Description: Tabla Resultados
    Value: !Ref ResultadosTable
  UsuariosTableName:
    Description: Tabla Usuarios
    Value: !Ref UsuariosTable
  S3BucketName:
    Description: Bucket S3 del frontend
    Value: !Ref S3Bucket
  CloudFrontDistributionId:
    Description: ID de la distribución CloudFront
    Value: !Ref CloudFrontDistribution
  CloudFrontUrl:
    Description: URL pública del frontend
    Value: !Sub https://${CloudFrontDistribution.DomainName}
