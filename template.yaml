AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TestsApp - Infraestructura completa

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 15
    MemorySize: 256

# ─── Parámetros ────────────────────────────────────────────────────────────────
Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  NotificationEmail:
    Type: String
    Default: alfcuemer@alu.edu.gva.com
    Description: Email para alertas de presupuesto

# ─── Recursos ──────────────────────────────────────────────────────────────────
Resources:

  # Cognito
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub testsapp-users-${Stage}
      AutoVerifiedAttributes: [email]
      Schema:
        - Name: role
          AttributeDataType: String
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub testsapp-client-${Stage}
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ─── DynamoDB ────────────────────────────────────────────────────────────────

  UtsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub testsapp-uts-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ut_id
          AttributeType: S
      KeySchema:
        - AttributeName: ut_id
          KeyType: HASH

  PreguntasTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub testsapp-preguntas-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ut_id
          AttributeType: S
        - AttributeName: pregunta_id
          AttributeType: S
      KeySchema:
        - AttributeName: ut_id
          KeyType: HASH
        - AttributeName: pregunta_id
          KeyType: RANGE

  ResultadosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub testsapp-resultados-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: alumno_id
          AttributeType: S
        - AttributeName: ut_id_timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: alumno_id
          KeyType: HASH
        - AttributeName: ut_id_timestamp
          KeyType: RANGE

  UsuariosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub testsapp-usuarios-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: grupo
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: grupo-index
          KeySchema:
            - AttributeName: grupo
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ─── API Gateway ─────────────────────────────────────────────────────────────
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub testsapp-api-${Stage}
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuth
        Authorizers:
          CognitoAuth:
            UserPoolArn: !GetAtt UserPool.Arn
        AddDefaultAuthorizerToCorsPreflight: false

  # ─── Lambda: Auth (Cognito trigger) ──────────────────────────────────────────
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-auth/
      Handler: index.handler
      Environment:
        Variables:
          USUARIOS_TABLE: !Ref UsuariosTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsuariosTable
      Events:
        PostConfirmation:
          Type: Cognito
          Properties:
            UserPool: !Ref UserPool
            Trigger: PostConfirmation

  # ─── Lambda: UTs ─────────────────────────────────────────────────────────────
  UtsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-uts/
      Handler: index.handler
      Environment:
        Variables:
          UTS_TABLE: !Ref UtsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UtsTable
      Events:
        GetUts:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /uts
            Method: GET
        CreateUt:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /uts
            Method: POST
        UpdateUt:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /uts/{id}
            Method: PUT
        DeleteUt:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /uts/{id}
            Method: DELETE

  # ─── Lambda: Preguntas ───────────────────────────────────────────────────────
  PreguntasFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-preguntas/
      Handler: index.handler
      Environment:
        Variables:
          PREGUNTAS_TABLE: !Ref PreguntasTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PreguntasTable
      Events:
        GetPreguntas:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /preguntas
            Method: GET
        CreatePregunta:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /preguntas
            Method: POST
        UpdatePregunta:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /preguntas/{id}
            Method: PUT
        DeletePregunta:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /preguntas/{id}
            Method: DELETE

  # ─── Lambda: Resultados ──────────────────────────────────────────────────────
  ResultadosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-resultados/
      Handler: index.handler
      Environment:
        Variables:
          RESULTADOS_TABLE: !Ref ResultadosTable
          USUARIOS_TABLE: !Ref UsuariosTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ResultadosTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsuariosTable
      Events:
        SaveResultado:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /resultados
            Method: POST
        GetResultados:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /resultados
            Method: GET

  # ─── Lambda: Ranking ─────────────────────────────────────────────────────────
  RankingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-ranking/
      Handler: index.handler
      Environment:
        Variables:
          USUARIOS_TABLE: !Ref UsuariosTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsuariosTable
      Events:
        GetRanking:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /ranking
            Method: GET

  # ─── Lambda: Usuarios ────────────────────────────────────────────────────────
  UsuariosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-usuarios/
      Handler: index.handler
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
          USUARIOS_TABLE: !Ref UsuariosTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsuariosTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminDeleteUser
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !GetAtt UserPool.Arn
      Events:
        GetUsuarios:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /usuarios
            Method: GET
        CreateUsuario:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /usuarios
            Method: POST
        UpdateUsuario:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /usuarios/{id}
            Method: PUT
        DeleteUsuario:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /usuarios/{id}
            Method: DELETE

  # ─── Lambda: Accesibilidad ───────────────────────────────────────────────────
  AccesibilidadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/lambda-accesibilidad/
      Handler: index.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - polly:SynthesizeSpeech
                - translate:TranslateText
              Resource: '*'
      Events:
        Sintetizar:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /accesibilidad/tts
            Method: POST
        Traducir:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /accesibilidad/traducir
            Method: POST


# ─── Outputs ───────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: URL de la API
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref UserPoolClient
  UtsTableName:
    Description: Tabla UTs
    Value: !Ref UtsTable
  PreguntasTableName:
    Description: Tabla Preguntas
    Value: !Ref PreguntasTable
  ResultadosTableName:
    Description: Tabla Resultados
    Value: !Ref ResultadosTable
  UsuariosTableName:
    Description: Tabla Usuarios
    Value: !Ref UsuariosTable
